services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: padix
      POSTGRES_USER: padix
      POSTGRES_PASSWORD: padix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padix"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/padix
      SPRING_DATASOURCE_USERNAME: padix
      SPRING_DATASOURCE_PASSWORD: padix
    ports:
      - "8080:8080"

  web:
    build: ./web
    depends_on:
      - api
    ports:
      - "8081:80"
    environment:
      VITE_API_BASE_URL: http://api:8080

volumes:
  pgdata: {}

