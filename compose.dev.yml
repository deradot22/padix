services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: padix
      POSTGRES_USER: padix
      POSTGRES_PASSWORD: padix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padix"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/padix
      SPRING_DATASOURCE_USERNAME: padix
      SPRING_DATASOURCE_PASSWORD: padix
    ports:
      - "8080:8080"

  web:
    image: docker.io/library/node:20-alpine
    depends_on:
      - api
    ports:
      # 8081 занят локальным Expo (padix-mobile, Metro bundler) — используем 8083
      - "8083:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    working_dir: /app
    environment:
      API_TARGET: http://api:8080
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "500"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  test-ui:
    image: docker.io/library/node:20-alpine
    depends_on:
      - api
    ports:
      - "8082:5174"
    volumes:
      - ./test-ui:/app
      - test_ui_node_modules:/app/node_modules
    working_dir: /app
    environment:
      API_TARGET: http://api:8080
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "500"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"

volumes:
  pgdata: {}
  web_node_modules: {}
  test_ui_node_modules: {}
