services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: padix
      POSTGRES_USER: padix
      POSTGRES_PASSWORD: padix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padix"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/padix
      SPRING_DATASOURCE_USERNAME: padix
      SPRING_DATASOURCE_PASSWORD: padix
      APP_BOT_BASE_URL: http://bot:8081
      APP_INTERNAL_SECRET: ${APP_INTERNAL_SECRET:-dev-internal-secret-change-me}
      # Базовый URL фронта — используется в письмах верификации и для Twitter callback.
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:8083}
      # Публичный URL API — нужен для redirect_uri в Twitter (должен совпадать с настройкой
      # в Twitter Developer Portal). В dev ходим через Vite proxy (тот же origin что и фронт)
      # чтобы Twitter не требовал отдельной регистрации :8080. В Twitter App настрой
      # callback URL: http://localhost:8083/api/auth/twitter/callback
      APP_API_PUBLIC_BASE_URL: ${APP_API_PUBLIC_BASE_URL:-http://localhost:8083}
      # Resend SMTP. Если пустой — письма пишутся в логи api (см. ConsoleMailService).
      # Зарегистрироваться: https://resend.com/signup → API Keys
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-Padix <onboarding@resend.dev>}
      # Telegram Login Widget — тот же bot-token что и для нотификаций (используется для HMAC-проверки).
      # Bot username нужен фронту чтобы отрисовать виджет. В BotFather: /setdomain → padix.club + localhost
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      APP_TELEGRAM_BOT_USERNAME: ${APP_TELEGRAM_BOT_USERNAME:-}
      # Google Sign-In Client ID (получить на console.cloud.google.com). Пусто — кнопка не показывается.
      APP_GOOGLE_CLIENT_ID: ${APP_GOOGLE_CLIENT_ID:-}
      # Facebook Login (https://developers.facebook.com). Нужны и App ID, и App Secret.
      APP_FACEBOOK_APP_ID: ${APP_FACEBOOK_APP_ID:-}
      APP_FACEBOOK_APP_SECRET: ${APP_FACEBOOK_APP_SECRET:-}
      # Twitter/X OAuth2 (https://developer.x.com). Нужны и Client ID, и Secret для exchange.
      APP_TWITTER_CLIENT_ID: ${APP_TWITTER_CLIENT_ID:-}
      APP_TWITTER_CLIENT_SECRET: ${APP_TWITTER_CLIENT_SECRET:-}
    ports:
      - "8080:8080"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/padix
      SPRING_DATASOURCE_USERNAME: padix
      SPRING_DATASOURCE_PASSWORD: padix
      APP_TELEGRAM_ENABLED: ${APP_TELEGRAM_ENABLED:-true}
      APP_TELEGRAM_DRY_RUN: ${APP_TELEGRAM_DRY_RUN:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      APP_TELEGRAM_BOT_USERNAME: ${APP_TELEGRAM_BOT_USERNAME:-padix_dev_bot}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:8083}
      APP_INTERNAL_SECRET: ${APP_INTERNAL_SECRET:-dev-internal-secret-change-me}
    ports:
      # 8081 на хосте занят локальным Expo; используем 8084 для дебага.
      # api ↔ bot внутри docker network всё равно идёт по http://bot:8081.
      - "8084:8081"

  web:
    image: docker.io/library/node:20-alpine
    depends_on:
      - api
    ports:
      # 8081 занят локальным Expo (padix-mobile, Metro bundler) — используем 8083
      - "8083:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    working_dir: /app
    environment:
      # По умолчанию ходит в локальный API в той же compose-сети.
      # Чтобы дернуть прод-API (и через него прод-бот) — добавь в .env:
      #   WEB_API_TARGET=https://api.padix.club
      # и перезапусти контейнер: docker compose -f compose.dev.yml up -d web
      # ⚠️ ВНИМАНИЕ: при WEB_API_TARGET=https://api.padix.club все действия из
      #     локального UI попадут в прод-БД, и бот пошлёт реальные сообщения!
      API_TARGET: ${WEB_API_TARGET:-http://api:8080}
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "500"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  test-ui:
    image: docker.io/library/node:20-alpine
    depends_on:
      - api
    ports:
      - "8082:5174"
    volumes:
      - ./test-ui:/app
      - test_ui_node_modules:/app/node_modules
    working_dir: /app
    environment:
      API_TARGET: http://api:8080
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "500"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"

volumes:
  pgdata: {}
  web_node_modules: {}
  test_ui_node_modules: {}
