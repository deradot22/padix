server:
  port: 8080
  # Поднимаем лимит POST-body, чтобы /api/feedback мог принять видео-вложение до ~7MB (data URL).
  # Аватары/скриншоты ≤500KB укладывались в дефолт 2MB, но фидбек-вложения крупнее.
  tomcat:
    max-http-form-post-size: 16MB
    max-swallow-size: 16MB

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/padix}
    username: ${SPRING_DATASOURCE_USERNAME:padix}
    password: ${SPRING_DATASOURCE_PASSWORD:padix}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

logging:
  level:
    org.hibernate.SQL: info

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  jwt:
    # В проде вынести в секрет/ENV. Для дев-старта ок.
    secret: ${APP_JWT_SECRET:change-me-in-prod-change-me-in-prod-change-me}
    ttlSeconds: ${APP_JWT_TTL_SECONDS:2592000} # 30 дней
  admin:
    username: ${APP_ADMIN_USERNAME:admin228}
    password: ${APP_ADMIN_PASSWORD:admin228}
    # Кто получает TG-уведомления о новых тикетах обратной связи — назначается в /admin
    # (флаг `users.is_feedback_admin`, см. миграцию V36). Юзер должен также привязать
    # свой Telegram через Настройки → Уведомления → Telegram (PRIVATE-чат).
  swagger:
    username: ${APP_SWAGGER_USERNAME:css101}
    password: ${APP_SWAGGER_PASSWORD:101css101}
  bot:
    base-url: ${APP_BOT_BASE_URL:}
  telegram:
    # Bot token из BotFather (тот же что использует bot-модуль).
    # Используется для HMAC-проверки Telegram Login Widget. Если пусто — TG-логин выключен.
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    # @username бота (без @) — нужен фронту чтобы отрисовать виджет логина.
    # В BotFather: /setdomain → padix.club, /setdomain → localhost (для dev).
    bot-username: ${APP_TELEGRAM_BOT_USERNAME:}
  google:
    # Google OAuth2 Client ID (получить на https://console.cloud.google.com/apis/credentials).
    # Если пусто — кнопка Google на /login не показывается.
    client-id: ${APP_GOOGLE_CLIENT_ID:}
  facebook:
    # Facebook App ID (https://developers.facebook.com → My Apps → app → Settings → Basic).
    # App secret НЕ должен утечь — используется только бэком для debug_token.
    # Если пусто — Facebook-логин выключен.
    app-id: ${APP_FACEBOOK_APP_ID:}
    app-secret: ${APP_FACEBOOK_APP_SECRET:}
  twitter:
    # Twitter/X OAuth2 Client ID (https://developer.x.com → Apps → app → User authentication settings).
    # Если пусто — Twitter-логин выключен.
    client-id: ${APP_TWITTER_CLIENT_ID:}
    client-secret: ${APP_TWITTER_CLIENT_SECRET:}
  internal:
    secret: ${APP_INTERNAL_SECRET:}
  # Базовый URL фронта — используется при формировании ссылок в письмах верификации
  # и для редиректа после Twitter OAuth callback.
  # В dev по-умолчанию 8083 (Vite через Docker). В проде задаётся через APP_PUBLIC_BASE_URL.
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8083}
  # Публичный URL самого API — нужен для Twitter callback (redirect_uri должен совпадать
  # с настройкой в Twitter Developer Portal).
  api-public-base-url: ${APP_API_PUBLIC_BASE_URL:http://localhost:8080}
  mail:
    # Адрес «От кого». Должен быть на верифицированном в Resend домене.
    from: ${APP_MAIL_FROM:Padix <noreply@padix.club>}
    resend:
      # API-ключ Resend. Если не задан — письма пишутся в логи (ConsoleMailService).
      api-key: ${RESEND_API_KEY:}

