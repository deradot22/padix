server:
  port: 8081

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/padix}
    username: ${SPRING_DATASOURCE_USERNAME:padix}
    password: ${SPRING_DATASOURCE_PASSWORD:padix}
  jpa:
    hibernate:
      # Bot не управляет схемой — миграции выполняет api. validate отключаем,
      # чтобы bot мог стартовать раньше api (race на холодном compose up).
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    enabled: false

logging:
  level:
    org.hibernate.SQL: warn

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8083}
  telegram:
    enabled: ${APP_TELEGRAM_ENABLED:false}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${APP_TELEGRAM_BOT_USERNAME:}
    api-base-url: ${APP_TELEGRAM_API_BASE_URL:https://api.telegram.org}
    polling-timeout-seconds: ${APP_TELEGRAM_POLLING_TIMEOUT_SECONDS:30}
  internal:
    secret: ${APP_INTERNAL_SECRET:}
